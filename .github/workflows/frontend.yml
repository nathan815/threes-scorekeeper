name: Frontend CI

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches: [ main ]
    paths:
      - frontend/**
      - .github/workflows/frontend.yml
  pull_request:
    branches: [ main ]
    paths:
      - frontend/**
      - .github/workflows/frontend.yml

jobs:
  build:
    defaults:
      run:
        working-directory: frontend

    runs-on: ubuntu-latest
    environment: build
    env:
      REACT_APP_CLARITY_KEY: "${{ secrets.REACT_APP_CLARITY_KEY }}"
      REACT_APP_GOOGLE_ANALYTICS_KEY: "${{ secrets.REACT_APP_GOOGLE_ANALYTICS_KEY }}"

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm ci
      - run: npm run build
      - run: npm run test

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build frontend-bundle image
        working-directory: infra
        run: |
          docker compose -f docker-compose.build.yml build frontend-bundle
          IMAGE_SHA=${{ github.sha }}
          docker tag nathan815/threes-frontend-bundle nathan815/threes-frontend-bundle:${IMAGE_SHA:0:7}
          docker tag nathan815/threes-frontend-bundle nathan815/threes-frontend-bundle:latest

      - name: Push frontend-bundle image to Docker Hub
        working-directory: infra
        run: |
          docker compose -f docker-compose.build.yml push frontend-bundle
          docker push nathan815/threes-frontend-bundle:${{ github.sha }}
          docker push nathan815/threes-frontend-bundle:latest
